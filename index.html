<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS電卓特設サイト | Cascade-path</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kosugi+Maru&family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&display=swap" rel="stylesheet">
    <style>
        :root{
            --main: #0e0;
        }
        body{
            margin: 0;
            background: #000;
            color: var(--main);
            font-size: 20px;
            font-family: "DotGothic16", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        header{
            background: #444;
            border-bottom: solid 2px var(--main);
        }
        .H-title{
            font-size: 2em;
            text-indent: 1em;
        }
    </style>
</head>
<body>
    <header>
        <div class="H-title">CSS電卓特設サイト</h1>
    </header>
    <nav>INDEX</nav>
    <div>HTMLとCSSの限界</div>
</body>
</html>
