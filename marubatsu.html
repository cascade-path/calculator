<style>
input{display:none}
#message{position:fixed;top:30px;font-weight:bold;font-size:30px}
#board0,#board1,#board2{position:fixed;top:100px;left:50px;width:315px;padding:7px 3px 1px 7px}
#board0{background:#000}
label{display:inline-block;width:100px;aspect-ratio:1/1;background:#ddd}
svg{width:100px;aspect-ratio:1/1;display:none}
circle{fill:none;stroke:#e00;stroke-width:5px;stroke-dasharray:400;animation:circle 2s}
line:first-child{stroke:#00e;stroke-width:5px;stroke-dasharray:400;animation:line 1s}
line:nth-child(2){stroke:#00e;stroke-width:5px;stroke-dasharray:400;animation:line2 2s}

@keyframes circle{0%{stroke-dashoffset:400}100%{stroke-dashoffset:100}}
@keyframes line{0%{stroke-dashoffset:400}100%{stroke-dashoffset:200}}
@keyframes line2{0%{opacity:0}29.9%{opacity:0}30%{stroke-dashoffset:400;opacity:1}100%{stroke-dashoffset:200}}

#circle00,#cross00{position:fixed;top:107px;left:55px}
#circle01,#cross01{position:fixed;top:107px;left:162px}
#circle02,#cross02{position:fixed;top:107px;left:269px}
#circle10,#cross10{position:fixed;top:214px;left:55px}
#circle11,#cross11{position:fixed;top:214px;left:162px}
#circle12,#cross12{position:fixed;top:214px;left:269px}

#circle21,#cross21{position:fixed;top:321px;left:162px}

#cell120:checked ~ #cross20{display:block}
#cell121:checked ~ #cross21{display:block}
#cell122:checked ~ #cross22{display:block}

input:checked ~ #message:after,
input:checked ~ input:checked ~ input:checked ~ #message:after,
input:checked ~ input:checked ~ input:checked ~ input:checked ~ input:checked ~ #message:after,
input:checked ~ input:checked ~ input:checked ~ input:checked ~ input:checked ~ input:checked ~ input:checked ~ #message:after{content:'〇の番です'}

input:checked ~ input:checked ~ input:checked ~ input:checked ~ #board1{display:block}
